name: Daily — refresh climate snapshots

# Runs every day from the 3rd to the 25th of each month at 04:00 UTC.
# Different upstream sources publish at different times within this window:
#
#   Source                  Typical publication    Window used here
#   ─────────────────────────────────────────────────────────────────
#   Met Office HadUK        3rd – 10th             days  3–14
#   OWID ERA5 (countries)   12th – 18th            days 10–25
#   World Bank CCKP (precip)12th – 18th            days 10–25
#   NOAA NCEI (global, US)  15th – 25th            days 13–25
#
# Each step checks the day-of-month and skips itself when outside its
# window, keeping runtime short on early and late days of the month.
#
# The commit step only fires when at least one JSON file actually changed
# compared to the previous commit, so the workflow is safe to run daily:
# if no source has advanced yet, nothing is committed and Vercel is not
# re-deployed.  Once a source does advance, the push triggers a new Vercel
# deployment which starts with a fresh ISR cache — pages reflect the new
# data on the very next request, with no 86400-second wait.
#
# The workflow can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: '0 4 3-25 * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      CLIMATE_RUN_LOG: .climate-snapshot-run/run.jsonl
      CLIMATE_RUN_SUMMARY_MD: .climate-snapshot-run/summary.md
      CLIMATE_RUN_SUMMARY_JSON: .climate-snapshot-run/summary.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # ── UK regions (Met Office HadUK: publishes ~3rd–10th) ──────────
      - name: Rebuild UK region snapshots
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild UK region snapshots"
          --window-start 3
          --window-end 14
          --outputs "public/data/climate/uk-region"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-uk-region-snapshots.mjs
        continue-on-error: true

      # ── Global (NOAA NCEI ~15th–25th; OWID ERA5 ~12th–18th) ─────────
      - name: Rebuild global snapshot
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild global snapshot"
          --window-start 10
          --window-end 25
          --outputs "public/data/climate/global-history.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-global-snapshot.mjs
        continue-on-error: true

      # ── ENSO / Pacific oceans (NOAA CPC: same window as NOAA global) ─
      - name: Rebuild ENSO snapshot
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild ENSO snapshot"
          --window-start 10
          --window-end 25
          --outputs "public/data/climate/enso.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-enso-snapshot.mjs
        continue-on-error: true

      # ── Per-country precipitation (World Bank CCKP: ~12th–18th) ─────
      # Must run BEFORE build-country-snapshots.
      - name: Rebuild country precipitation
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild country precipitation"
          --window-start 10
          --window-end 25
          --outputs "public/data/climate/country-precip"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-country-precip.mjs
        continue-on-error: true

      # ── Per-country snapshots (OWID ERA5: ~12th–18th) ─────────────────
      - name: Rebuild country snapshots
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild country snapshots"
          --window-start 10
          --window-end 25
          --outputs "public/data/climate/country"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-country-snapshots.mjs
        continue-on-error: true

      # ── Resync countryAnomalies on the global snapshot ───────────────
      # Re-run after per-country files are rebuilt so the world map always
      # reflects the latest month for every country.
      - name: Patch country anomalies on global snapshot
        run: >
          node scripts/climate-step-log.mjs run
          --name "Patch country anomalies on global snapshot"
          --window-start 10
          --window-end 25
          --outputs "public/data/climate/global-history.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/patch-country-anomalies.mjs
        continue-on-error: true

      # ── US national (NOAA national time series: ~15th–25th) ──────────
      - name: Rebuild US national snapshot
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild US national snapshot"
          --window-start 13
          --window-end 25
          --outputs "public/data/climate/us-national.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-us-national-snapshot.mjs
        continue-on-error: true

      # ── US states (NOAA statewide: ~15th–25th, ~30 min) ─────────────
      - name: Rebuild US state snapshots
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild US state snapshots"
          --window-start 13
          --window-end 25
          --outputs "public/data/climate/us-state"
          --log-path "$CLIMATE_RUN_LOG"
          --
          node scripts/build-us-state-snapshots.mjs
        continue-on-error: true

      # ── Derived (run after all source scripts) ───────────────────────
      - name: Rebuild shifting-seasons global snapshot
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild shifting-seasons global snapshot"
          --outputs "public/data/seasons/shift-global.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          npm run build:climate-shift-global
        continue-on-error: true

      - name: Rebuild climate rankings
        run: >
          node scripts/climate-step-log.mjs run
          --name "Rebuild climate rankings"
          --outputs "public/data/climate/rankings.json,public/data/climate/rankings-previous.json"
          --log-path "$CLIMATE_RUN_LOG"
          --
          npm run build:climate-rankings
        continue-on-error: true

      - name: Build climate run summary
        if: always()
        run: |
          node scripts/climate-step-log.mjs summarize \
            --log-path "$CLIMATE_RUN_LOG" \
            --md-path "$CLIMATE_RUN_SUMMARY_MD" \
            --json-path "$CLIMATE_RUN_SUMMARY_JSON"
          cat "$CLIMATE_RUN_SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload climate run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: climate-snapshot-run-${{ github.run_number }}
          path: |
            ${{ env.CLIMATE_RUN_LOG }}
            ${{ env.CLIMATE_RUN_SUMMARY_MD }}
            ${{ env.CLIMATE_RUN_SUMMARY_JSON }}
          if-no-files-found: warn

      # ── Commit only if data actually advanced ────────────────────────
      # Build scripts always write a fresh generatedAt timestamp, so a naive
      # `git diff --quiet` would always detect a change and commit even when
      # no real data has moved.  Instead we strip generatedAt lines from the
      # diff and only commit when something substantive changed.  This keeps
      # the repo quiet between real monthly data advances, avoids unnecessary
      # Vercel redeploys, and prevents the ISR + Redis profile-API cache from
      # being busted daily by a timestamp-only change.
      - name: Commit updated snapshots
        run: |
          git diff --stat -- public/data/climate/ public/data/seasons/
          NON_TS_CHANGES=$(git diff -- public/data/climate/ public/data/seasons/ \
            | grep -E '^[-+]' | grep -vE '^(---|\+\+\+)' \
            | grep -v '"generatedAt"' | wc -l | tr -d ' ')
          if [ "$NON_TS_CHANGES" -eq 0 ]; then
            echo "✓ No data changes — only timestamps differ, skipping commit."
            exit 0
          fi
          CHANGED=$(git diff --name-only -- public/data/climate/ public/data/seasons/ | wc -l | tr -d ' ')
          echo "Committing $CHANGED changed file(s) with real data updates…"
          git config user.name "climate-snapshot-bot"
          git config user.email "climate-snapshot-bot@users.noreply.github.com"
          git add public/data/climate/ public/data/seasons/
          git commit -m "chore(climate): refresh snapshots ($(date -u +%Y-%m-%d))"
          git push
          echo "✓ Pushed — Vercel will deploy updated data on the next request."

name: Monthly — rebuild global climate snapshot

# Runs on the 5th of each month at 04:00 UTC (both NOAA and OWID normally
# have the previous month's data by then), and can be triggered manually
# from the Actions tab.
on:
  schedule:
    - cron: '0 4 5 * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild snapshot
        run: node scripts/build-global-snapshot.mjs

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- public/data/climate/global-history.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "climate-snapshot-bot"
          git config user.email "climate-snapshot-bot@users.noreply.github.com"
          git add public/data/climate/global-history.json
          git commit -m "chore(climate): refresh global snapshot ($(date -u +%Y-%m-%d))"
          git push
